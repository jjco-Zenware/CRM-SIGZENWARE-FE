<div class="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <i class="pi pi-bullseye"></i>
      <span>CRM Empresarial</span>
    </div>
    <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      <div class="field">
        <label for="correo">Correo</label>
        <input id="correo" type="email" pInputText formControlName="correo" placeholder="usuario@empresa.com" />
        <small class="error" *ngIf="form.get('correo')?.touched && form.get('correo')?.invalid">
          Ingresa un correo válido.
        </small>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" pInputText formControlName="password" placeholder="••••••••" />
        <small class="error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          Mínimo 6 caracteres.
        </small>
      </div>

      <button pButton type="submit" label="Ingresar" class="p-button-primary login-btn" [loading]="loading"></button>
    </form>
  </div>
</div>
