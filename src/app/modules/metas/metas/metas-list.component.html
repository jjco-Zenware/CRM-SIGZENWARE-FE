<app-page-header [title]="pageTitle" [subtitle]="pageSubtitle"></app-page-header>

<app-data-table
  title="Listado de metas"
  [columns]="columns"
  [data]="data"
  [totalRecords]="total"
  [loading]="loading"
  [rows]="query.pageSize || 10"
  [showNewButton]="!readOnly"
  [showActionsColumn]="!readOnly"
  (pageChange)="onPageChange($event)"
  (search)="onSearch($event)"
  (sort)="onSort($event)"
  (newItem)="openNew()"
  (editItem)="openEdit($event)"
  (deleteItem)="remove($event)"
  (exportExcel)="exportExcel()"
  (exportPdf)="exportPdf()"
></app-data-table>

<p-dialog [(visible)]="dialogVisible" [modal]="true" [style]="{width: '32rem'}" [header]="editing ? 'Editar meta' : 'Nueva meta'">
  <form [formGroup]="form" class="form-grid">
    <div class="field ">
      <label>Nombre de la meta</label>
      <input pInputText formControlName="nombre" />
    </div>
    <div class="field">
      <label>Responsable</label>
      <input pInputText formControlName="responsable" />
    </div>
    <div class="field">
      <label>Periodo</label>
      <input pInputText formControlName="periodo" placeholder="Ej. 2026-Q3" />
    </div>
    <div class="field">
      <label>Monto objetivo</label>
      <p-inputNumber formControlName="montoObjetivo" mode="currency" currency="USD" locale="en-US"></p-inputNumber>
    </div>
    <div class="field">
      <label>Monto alcanzado</label>
      <p-inputNumber formControlName="montoAlcanzado" mode="currency" currency="USD" locale="en-US"></p-inputNumber>
    </div>
    <div class="field ">
      <label>Estado</label>
      <p-dropdown [options]="estados" formControlName="estado" optionLabel="label" optionValue="value"></p-dropdown>
    </div>
    <div class="field switch-field col-2">
      <label>Activo</label>
      <p-inputSwitch formControlName="activo"></p-inputSwitch>
    </div>
  </form>
  <ng-template pTemplate="footer">
    <button pButton label="Cancelar" class="p-button-text" (click)="dialogVisible=false"></button>
    <button pButton label="Guardar" icon="pi pi-check" (click)="save()"></button>
  </ng-template>
</p-dialog>
